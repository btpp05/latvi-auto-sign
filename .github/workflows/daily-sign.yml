name: "自动签到"
on:
  push:
    branches: [main]
  schedule:
    - cron: "0 2 * * *"

jobs:
  sign:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 执行签到
        id: sign
        env:
          LATVI_EMAIL: ${{ secrets.LATVI_EMAIL }}
          LATVI_PASSWORD: ${{ secrets.LATVI_PASSWORD }}
        run: |
          python3 latvi_sign.py 2>&1 | tee /tmp/sign_result.txt
      - name: 发送 Telegram 通知
        if: always()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          # 去掉 ANSI 颜色码，生成 JSON payload
          sed 's/\x1b\[[0-9;]*m//g' /tmp/sign_result.txt \
            | grep -v '^\s*$' \
            | python3 -c "
import json, sys
text = sys.stdin.read().strip()
print(json.dumps({'chat_id': '644820320', 'text': text}))
" > /tmp/tg_payload.json
          # 发送到 Telegram
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d @/tmp/tg_payload.json
          echo ""