name: "每日自动签到"
on:
  schedule:
    - cron: "0 2 * * *"   # 北京时间 10:00 UTC 2:00
  workflow_dispatch:       # 也支持手动触发

jobs:
  sign:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 执行签到
        id: sign
        env:
          LATVI_EMAIL: ${{ secrets.LATVI_EMAIL }}
          LATVI_PASSWORD: ${{ secrets.LATVI_PASSWORD }}
        run: |
          python3 latvi_sign.py 2>&1 | tee /tmp/sign_result.txt
      - name: 发送 Telegram 通知
        if: always()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          # 去掉 ANSI 颜色码后存为 JSON payload
          sed 's/\x1b\[[0-9;]*m//g' /tmp/sign_result.txt | grep -v '^\s*$' \
            | python3 -c "
import json, sys
text = sys.stdin.read().strip()
print(json.dumps({'chat_id': '644320820', 'text': text}))
" > /tmp/tg_payload.json
          # 发送到 Telegram
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d @/tmp/tg_payload.json
          echo ""