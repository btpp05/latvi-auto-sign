name: "自动签到"
on:
  push:
    branches: [main]
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  sign:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 执行签到
        env:
          LATVI_EMAIL: ${{ secrets.LATVI_EMAIL }}
          LATVI_PASSWORD: ${{ secrets.LATVI_PASSWORD }}
        run: |
          python3 latvi_sign.py 2>&1 | tee /tmp/sign_result.txt
      - name: 发送 Telegram 通知
        if: always()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          # 去掉 ANSI 颜色码后调用通知脚本
          sed 's/\x1b\[[0-9;]*m//g' /tmp/sign_result.txt > /tmp/sign_clean.txt
          python3 tg_notify.py